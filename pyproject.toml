[project]
name = "mcpilot"
version = "0.1.0"
description = "Context-aware MCP server advisor — recommends the right MCP servers for your project and explains why"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=3.2.0",
    "duckdb>=1.0",
    "sentence-transformers>=3.0",
    "requests>=2.33.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcpilot"]

[dependency-groups]
dev = ["pytest>=9.0.3"]
